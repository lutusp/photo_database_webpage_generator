<!DOCTYPE html>
<html lang="en">

<!-- NOTE: Large image sets (> 500 images) will cause some browses to crash. One exception: Firefox -->

<head>
    <meta charset="utf-8">
    <title>Searchable Picture Gallery</title>
    <style>
        .fix-div {
            position: sticky;
            z-index: 9999;
            background: black;
            padding: 8px;
            top: 0;
            left: 0;
        }

        body {
            background-color: black;
            margin-top: 0;
        }
    </style>
</head>

<body>
    <div class="fix-div">
        <p style="color:white">Enter search words here:&nbsp;&nbsp;&nbsp;<input style="color:black" type="text" id="search-input" placeholder="Search images..." />&nbsp;&nbsp;&nbsp;<span style="color:white" id="showtotal"></span></p>
    </div>
    <div class="gallery">
        #html_data#
    </div>
    <script>
        const searchInput = document.getElementById('search-input');
        const showtotal = document.getElementById('showtotal');
        const items = document.querySelectorAll('.gallery-item');
        // prepare array for fast searches
        // cannot use associative array because
        // some images have duplicate descriptions
        var total = 0;
        const searchItems = [];
        items.forEach(item => {
            const key = item.getAttribute('title');
            searchItems.push({ key: key, value: item });
            total += 1;
        });
        showtotal.innerHTML = "Images: " + total;
        searchInput.addEventListener('input', (e) => {
            var total = 0;
            try {
                // regex syntax errors are possible here
                const regex = new RegExp(e.target.value, "i");
                searchItems.forEach(item => {
                    if (regex.test(item.key)) {
                        item.value.style.display = 'inline';
                        total += 1;

                    } else {
                        item.value.style.display = 'none';
                    }
                });
            }
            catch (error) {
                // disregard user regex input errors
            }
            showtotal.innerHTML = "Found " + total;
        });


    </script>
</body>

</html>
